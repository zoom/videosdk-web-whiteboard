<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whiteboard for Video SDK</title>
</head>

<body class="flex flex-col h-screen overflow-hidden">
  <!-- Control bar -->
  <div id="control-bar"
    class="flex items-center gap-2 px-4 py-4 bg-white/80 backdrop-blur-sm border-b border-gray-200/60">
    <h1 class="text-sm font-semibold text-gray-800 mr-auto">Whiteboard for Video SDK</h1>
    <button id="stop-btn" class="ctrl-btn ctrl-leave hidden">
      Leave
    </button>
    <button id="toggle-video-btn" class="ctrl-btn hidden">
      Toggle Video
    </button>
    <button id="whiteboard-btn" class="ctrl-btn ctrl-whiteboard hidden">
      Start Whiteboard
    </button>
    <button id="export-whiteboard-btn" class="ctrl-btn ctrl-export hidden">
      Export PDF
    </button>
  </div>

  <!-- Main content area -->
  <div id="content-area" class="relative flex-1 min-h-0">
    <button id="start-btn" class="ctrl-btn ctrl-join block m-auto my-16">
      Start Session
    </button>
    <div id="whiteboard-container" class="hidden"></div>
    <video-player-container></video-player-container>
  </div>

  <script src="/coi-serviceworker.js"></script>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
